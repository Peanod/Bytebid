{% extends "base.html" %}
{% block title %}Notifikasi - ByteBid{% endblock %}
{% block head %}
<style>
  .notif-page{padding:2.5rem 0;min-height:calc(100vh - 64px)}
  .header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
  .header-row h1{font-family:'Outfit',sans-serif;font-size:1.8rem;font-weight:800}
  .header-row h1 span{color:var(--red)}
  .notif-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:.75rem;display:flex;gap:1rem;align-items:flex-start;cursor:pointer;transition:border-color .2s}
  .notif-card:hover{border-color:#3a3a50}
  .notif-card.unread{border-left:3px solid var(--red)}
  .notif-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
  .notif-icon.win{background:rgba(0,214,143,.2);color:var(--green)}
  .notif-icon.lose{background:rgba(136,136,170,.2);color:var(--muted)}
  .notif-icon.outbid{background:var(--red-dim);color:var(--red)}
  .notif-icon.system{background:rgba(0,188,212,.2);color:var(--cyan)}
  .notif-body{flex:1}
  .notif-title{font-weight:700;margin-bottom:.25rem}
  .notif-msg{font-size:.875rem;color:var(--muted);line-height:1.5}
  .notif-time{font-size:.72rem;color:var(--muted);margin-top:.5rem}
  .notif-empty{text-align:center;padding:5rem 2rem;color:var(--muted)}
  .notif-empty-icon{font-size:3rem;margin-bottom:1rem}
</style>
{% endblock %}
{% block content %}
<section class="notif-page">
  <div class="container" style="max-width:740px">
    <div class="header-row">
      <h1>Notifikasi <span id="unread-count"></span></h1>
      <button id="mark-all" class="btn btn-ghost" style="display:none">Tandai semua dibaca</button>
    </div>
    <div id="notif-list" class="loading"><div class="spinner"></div></div>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
if (!ByteBid.auth.isAuthenticated()) {
  window.location.href = '/login';
}

const ICONS = { win: '🏆', lose: '😔', outbid: '⚠️', system: 'ℹ️', new_item: '🆕' };

async function loadNotifications() {
  try {
    const data = await ByteBid.notifications.list();
    const list = document.getElementById('notif-list');
    list.classList.remove('loading');

    if (data.unread_count > 0) {
      document.getElementById('unread-count').innerHTML =
        `<span style="background:var(--red);color:#fff;font-size:.7rem;border-radius:20px;padding:.2rem .6rem;margin-left:.5rem">${data.unread_count}</span>`;
      document.getElementById('mark-all').style.display = 'inline-flex';
    }

    if (!data.notifications || data.notifications.length === 0) {
      list.innerHTML = `
        <div class="notif-empty">
          <div class="notif-empty-icon">🔔</div>
          <div>Belum ada notifikasi</div>
        </div>`;
      return;
    }

    list.innerHTML = data.notifications.map(n => `
      <div class="notif-card ${n.is_read ? '' : 'unread'}" data-id="${n.id}" data-item="${n.item_id || ''}">
        <div class="notif-icon ${n.type}">${ICONS[n.type] || '🔔'}</div>
        <div class="notif-body">
          <div class="notif-title">${ByteBid.escapeHtml(n.title)}</div>
          <div class="notif-msg">${ByteBid.escapeHtml(n.message)}</div>
          <div class="notif-time">${formatRelative(n.created_at)}</div>
        </div>
      </div>
    `).join('');

    // Click → mark as read & navigate to item
    list.querySelectorAll('.notif-card').forEach(card => {
      card.addEventListener('click', async () => {
        const id = card.dataset.id;
        const itemId = card.dataset.item;
        if (card.classList.contains('unread')) {
          try { await ByteBid.notifications.markRead(id); } catch (e) {}
          card.classList.remove('unread');
        }
        if (itemId) window.location.href = `/pantau/${itemId}`;
      });
    });

  } catch (err) {
    document.getElementById('notif-list').innerHTML =
      `<div class="error-msg">Gagal memuat: ${err.message}</div>`;
  }
}

function formatRelative(iso) {
  const d = new Date(iso);
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return 'Baru saja';
  if (diff < 3600) return `${Math.floor(diff/60)} menit lalu`;
  if (diff < 86400) return `${Math.floor(diff/3600)} jam lalu`;
  return d.toLocaleDateString('id-ID');
}

document.getElementById('mark-all').addEventListener('click', async () => {
  await ByteBid.notifications.markAllRead();
  loadNotifications();
});

loadNotifications();
</script>
{% endblock %}
