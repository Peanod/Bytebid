{% extends "base.html" %}
{% block title %}Masuk - ByteBid{% endblock %}
{% block head %}
<style>
  .auth-page{min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,rgba(232,23,58,0.06) 0%,transparent 70%);padding:2rem}
  .auth-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.5rem;width:100%;max-width:440px}
  .auth-logo{font-family:'Outfit',sans-serif;font-size:1.5rem;font-weight:800;margin-bottom:1rem}
  .auth-logo span{color:var(--red)}
  .auth-title{font-size:1.3rem;font-weight:700;margin-bottom:2rem;text-align:center}
  .auth-footer{text-align:center;margin-top:1.25rem;font-size:.875rem;color:var(--muted)}
  .auth-footer a{color:var(--red);text-decoration:none;font-weight:600}
  .forgot{display:block;text-align:right;font-size:.8rem;color:var(--red);margin-top:.35rem;text-decoration:none}
</style>
{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">Byte<span>Bid</span></div>
    <div class="auth-title">Selamat Datang Kembali</div>
    <div id="error-box" class="error-msg" style="display:none"></div>
    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Username atau Email</label>
        <input class="form-input" type="text" name="identifier" placeholder="username atau nama@email.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" name="password" placeholder="Min. 8 Karakter" required/>
        <a href="/forgot-password" class="forgot">Lupa Password?</a>
      </div>
      <button type="submit" id="submit-btn" class="btn btn-red btn-block" style="width:100%;padding:.85rem;font-size:1rem;border-radius:10px;margin-top:.5rem">
        Masuk
      </button>
    </form>
    <div class="auth-footer">Belum punya akun? <a href="/register">Daftar</a></div>
    <div style="margin-top:1.5rem;padding:1rem;background:var(--bg3);border-radius:8px;font-size:.8rem;color:var(--muted)">
      <strong style="color:var(--text)">Demo:</strong> demo / demo123 atau admin / admin123
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// Already logged in? redirect
if (ByteBid.auth.isAuthenticated()) window.location.href = '/lelang';

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const errBox = document.getElementById('error-box');
  const btn = document.getElementById('submit-btn');
  errBox.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Memproses...';
  try {
    await ByteBid.auth.login({
      identifier: fd.get('identifier'),
      password: fd.get('password'),
    });
    ByteBid.toast('Login berhasil!', 'success');
    setTimeout(() => window.location.href = '/lelang', 500);
  } catch (err) {
    errBox.textContent = err.message;
    errBox.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Masuk';
  }
});
</script>
{% endblock %}
