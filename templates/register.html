{% extends "base.html" %}
{% block title %}Daftar - ByteBid{% endblock %}
{% block head %}
<style>
  .auth-page {
    min-height: calc(100vh - 64px);
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, rgba(232,23,58,0.06) 0%, transparent 70%);
    padding: 2rem;
  }
  .auth-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 440px;
  }
  .auth-logo { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 800; margin-bottom: 1rem; }
  .auth-logo span { color: var(--red); }
  .auth-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 2rem; }
  .auth-footer { text-align: center; margin-top: 1.25rem; font-size: .875rem; color: var(--muted); }
  .auth-footer a { color: var(--red); text-decoration: none; font-weight: 600; }
</style>
{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">Byte<span>Bid</span></div>
    <div class="auth-title">Buat Akun Baru</div>
    {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Nama Lengkap</label>
        <input class="form-input" type="text" name="name" placeholder="Masukkan nama kamu" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" name="email" placeholder="nama@email.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" name="password" placeholder="Min. 8 Karakter" minlength="8" required/>
      </div>
      <button type="submit" class="btn btn-red btn-block" style="width:100%;padding:.85rem;font-size:1rem;border-radius:10px;margin-top:.5rem">
        Daftar Sekarang
      </button>
    </form>
    <div class="auth-footer">Sudah punya akun? <a href="{{ url_for('main.login') }}">Login</a></div>
  </div>
</div>
{% endblock %}
